<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="1600" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0815"/>
      <stop offset="100%" stop-color="#1A1026"/>
    </linearGradient>

    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4FA3"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4FA3"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- subtle stars -->
  <g fill="#ffffff" opacity="0.25">
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="310" cy="45" r="1"/>
    <circle cx="520" cy="130" r="1.2"/>
    <circle cx="980" cy="70" r="1"/>
    <circle cx="1450" cy="110" r="1.4"/>
    <circle cx="1280" cy="55" r="1"/>
    <circle cx="1380" cy="210" r="1"/>
    <circle cx="240" cy="210" r="1"/>
    <circle cx="90" cy="300" r="1"/>
    <circle cx="1520" cy="300" r="1.3"/>
  </g>

  <text x="800" y="150"
        text-anchor="middle"
        font-size="78"
        font-weight="700"
        font-family="Segoe UI, Arial, Helvetica, sans-serif"
        fill="url(#title)"
        filter="url(#glow)">
      Anamika Yadav
  </text>

  <line x1="470" y1="178" x2="1130" y2="178"
        stroke="url(#line)"
        stroke-width="3"
        stroke-linecap="round"/>

  <text x="800"
        y="220"
        text-anchor="middle"
        font-size="28"
        fill="#F5F5F5"
        font-family="Segoe UI, Arial, Helvetica, sans-serif">
      Building Intelligent Systems
  </text>

  <text x="800"
        y="270"
        text-anchor="middle"
        font-size="22"
        fill="#BDB5C9"
        font-style="italic"
        font-family="Georgia, serif">
      Understanding how things work. Building them better.
  </text>

  <line x1="640" y1="330" x2="960" y2="330"
        stroke="#D4AF37"
        stroke-width="2"
        opacity="0.8"/>
</svg>
