<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD6EC"/>
      <stop offset="55%" stop-color="#F3C6E8"/>
      <stop offset="100%" stop-color="#C9B6E4"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8FC0"/>
      <stop offset="100%" stop-color="#FF5DA8"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5DA8"/>
      <stop offset="100%" stop-color="#8F6FD6"/>
    </linearGradient>
  </defs>

  <!-- outer shadow -->
  <rect x="24" y="24" width="1152" height="332" fill="#2B2130" opacity="0.35"/>
  <!-- window body -->
  <rect x="16" y="16" width="1152" height="332" fill="url(#sky)" stroke="#2B2130" stroke-width="3"/>

  <!-- clouds -->
  <g fill="#ffffff" opacity="0.55">
    <ellipse cx="150" cy="90" rx="70" ry="22"/>
    <ellipse cx="205" cy="100" rx="50" ry="18"/>
    <ellipse cx="1040" cy="260" rx="80" ry="24"/>
    <ellipse cx="1095" cy="270" rx="55" ry="18"/>
  </g>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="90" cy="60" r="2"/>
    <circle cx="1120" cy="55" r="2"/>
    <circle cx="980" cy="90" r="1.5"/>
    <circle cx="230" cy="55" r="1.5"/>
    <circle cx="1150" cy="150" r="1.5"/>
  </g>

  <!-- crescent moon -->
  <path d="M 1080 60 a 22 22 0 1 0 0 44 a 17 17 0 1 1 0 -44 Z" fill="#FFF3C4"/>

  <!-- title bar -->
  <rect x="16" y="16" width="1152" height="46" fill="url(#titlebar)" stroke="#2B2130" stroke-width="3"/>
  <text x="40" y="46" font-family="Consolas, 'Courier New', monospace" font-size="20" font-weight="700" fill="#ffffff">♥ ANAMIKA.EXE</text>
  <g stroke="#2B2130" stroke-width="2">
    <rect x="1050" y="27" width="24" height="24" fill="#ffffff"/>
    <line x1="1057" y1="45" x2="1067" y2="45"/>
    <rect x="1082" y="27" width="24" height="24" fill="#ffffff"/>
    <rect x="1087" y="32" width="14" height="14" fill="none"/>
    <rect x="1114" y="27" width="24" height="24" fill="#FF6B6B"/>
    <line x1="1120" y1="33" x2="1132" y2="45"/>
    <line x1="1132" y1="33" x2="1120" y2="45"/>
  </g>

  <!-- name -->
  <text x="600" y="210" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="64" font-weight="700" letter-spacing="2" fill="url(#nameGrad)">Anamika Yadav</text>

  <!-- tagline -->
  <text x="600" y="255" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#3A2A40">Building Intelligent Systems</text>

  <!-- sub -->
  <text x="600" y="290" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#5A4468">understanding how things work, then building them better ✧</text>
</svg>
