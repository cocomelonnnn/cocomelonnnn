<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4FA3"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4FA3"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1560" height="480" rx="24"
        fill="#15101F" stroke="url(#border)" stroke-width="3"/>

  <text x="70" y="75"
        font-family="Segoe UI, Arial"
        font-size="30"
        font-weight="700"
        fill="#FF4FA3">
    ✦ PROFILE
  </text>

  <line x1="70" y1="95" x2="1530" y2="95"
        stroke="#D4AF37"
        stroke-width="2"/>

  <g font-family="Segoe UI, Arial">
    <text x="90" y="150" font-size="16" fill="#D4AF37">NAME</text>
    <text x="90" y="182" font-size="28" fill="#F5F5F5">Anamika Yadav</text>

    <text x="90" y="240" font-size="16" fill="#D4AF37">ROLE</text>
    <text x="90" y="272" font-size="26" fill="#F5F5F5">Computer Engineering Student</text>

    <text x="90" y="330" font-size="16" fill="#D4AF37">LOCATION</text>
    <text x="90" y="362" font-size="26" fill="#F5F5F5">Mumbai, India</text>

    <text x="90" y="420" font-size="16" fill="#D4AF37">INTERESTS</text>
    <text x="90" y="452" font-size="24" fill="#F5F5F5">AI • Financial Systems • Backend</text>

    <text x="90" y="485" font-size="16" fill="#D4AF37">STATUS</text>
    <circle cx="185" cy="479" r="7" fill="#FF4FA3"/>
    <text x="202" y="485" font-size="20" fill="#F5F5F5">BUILDING</text>
  </g>

  <line x1="940" y1="120" x2="940" y2="460"
        stroke="#3A304B" stroke-width="2"/>

  <!-- network -->
  <g stroke="#7A6B8D" stroke-width="2" fill="none">
    <line x1="1110" y1="170" x2="1230" y2="130"/>
    <line x1="1110" y1="170" x2="1180" y2="270"/>
    <line x1="1230" y1="130" x2="1360" y2="210"/>
    <line x1="1180" y1="270" x2="1360" y2="210"/>
    <line x1="1180" y1="270" x2="1290" y2="360"/>
    <line x1="1360" y1="210" x2="1290" y2="360"/>
  </g>

  <g fill="url(#node)">
    <circle cx="1110" cy="170" r="10"/>
    <circle cx="1230" cy="130" r="10"/>
    <circle cx="1180" cy="270" r="10"/>
    <circle cx="1360" cy="210" r="10"/>
    <circle cx="1290" cy="360" r="10"/>
  </g>

  <text x="1225" y="425"
        text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="22"
